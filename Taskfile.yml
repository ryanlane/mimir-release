# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  release:bump:
    desc: Release bump helper (defaults to dry-run; pass args after --)
    cmds:
      - bash scripts/release_bump.sh {{.CLI_ARGS}}

  release:bump:apply:
    desc: Apply release bump helper and push tags/manifest
    cmds:
      - bash scripts/release_bump.sh --apply

  release:bump:force:
    desc: Apply release bump helper even with dirty working trees
    cmds:
      - bash scripts/release_bump.sh --apply --allow-dirty

  release:dirty:
    desc: Show dirty file details in release-related repos
    cmds:
      - bash scripts/release_bump.sh --show-dirty
