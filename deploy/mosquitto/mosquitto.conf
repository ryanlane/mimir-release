# Mimir MQTT broker — production (managed by mimir-release).
#
#   1883 on 0.0.0.0  — LAN listener for displays; requires passwd auth.
#   1884 on 127.0.0.1 — anonymous localhost listener for the host-networked
#                       API, the compose healthcheck, and local debugging.
#
# passwd is generated by install_server.sh (mosquitto_passwd) from the
# MQTT_USER / MQTT_PASSWORD values in .env.

per_listener_settings true

listener 1883 0.0.0.0
allow_anonymous false
password_file /mosquitto/config/passwd

listener 1884 127.0.0.1
allow_anonymous true

persistence true
persistence_location /mosquitto/data/

log_dest stdout
